name: Build
on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - feat/rust-crate

concurrency:
  # Concurrency group that uses the workflow name and PR number if available
  # or commit SHA as a fallback. If a new build is triggered under that
  # concurrency group while a previous build is running it will be canceled.
  # Repeated pushes to a PR will cancel all previous builds, while multiple
  # merges to main will not cancel.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  rust-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Retrieve the source code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Check formatting
      working-directory: rust
      run: cargo fmt --check
    - name: Run clippy (release feature set)
      working-directory: rust
      run: cargo clippy --features cli -- -D warnings
    - name: Run clippy (with test-support)
      working-directory: rust
      run: cargo clippy --features cli,test-support -- -D warnings
    - name: Run tests (release feature set, verifies test-support is properly gated)
      working-directory: rust
      run: cargo test --features cli --verbose
    - name: Run tests (with test-support)
      working-directory: rust
      run: cargo test --features cli,test-support --verbose
    - name: Build release binary (with test-support for parity tests)
      working-directory: rust
      run: cargo build --features cli,test-support --release
    - name: Upload Rust binary
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: rust-bin-${{ matrix.os }}
        path: |
          rust/target/release/anaconda-anon-usage
          rust/target/release/anaconda-anon-usage.exe
        if-no-files-found: error
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Retrieve the source code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Build the package
      shell: bash
      run: |
        source $CONDA/etc/profile.d/conda.sh
        conda install conda-build
        conda build conda.recipe
        mv $CONDA/conda-bld .
    - name: Upload build artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        if-no-files-found: error
        name: conda-bld
        path: conda-bld/
  test:
    needs: [build, rust-test]
    env:
      ANACONDA_ANON_USAGE_DEBUG: 1
      ANACONDA_ANON_USAGE_RAISE: 1
      PYTHONUNBUFFERED: 1
    defaults:
      run:
        # https://github.com/conda-incubator/setup-miniconda#use-a-default-shell
        shell: bash -el {0}  # bash exit immediately on error + login shell
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest runs on x86_64, ubuntu-24.04-arm on arm64
        # macos-15-intel defaults to osx-64, macos-latest defaults to osx-arm64
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-latest, windows-latest]
        # 23.5.2 : last patch-based variant
        # 23.7.0 : first plugin-based variant, but conda info --envs --json is broken
        # 23.9.0 : last variant with the classic default solver
        # 23.10.0 : first variant with the libmamba default solver
        cversion: ['4.11.0', '4.14.0', '22.11.1', '23.5.2', '23.7.1', '23.9.0', '23.11.0', '24.11.3', '25.11.1', '26.3.2']
        # Use the last Anaconda-released version of conda on osx-64
        exclude:
          - os: macos-15-intel
            cversion: '25.11.1'
          - os: macos-15-intel
            cversion: '26.3.2'
        include:
          - os: macos-15-intel
            cversion: '25.7.0'
    runs-on: ${{ matrix.os }}
    steps:
    - name: Retrieve the source code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Download build artfiacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: conda-bld
        path: conda-bld
    - name: Download Rust binary
      if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest' || matrix.os == 'windows-latest'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: rust-bin-${{ matrix.os }}
        path: rust/target/release
    - name: Make Rust binary executable
      if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
      run: chmod +x rust/target/release/anaconda-anon-usage
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3.3.0
      with:
        miniconda-version: 'latest'
        auto-activate-base: true
        activate-environment: true
        python-version: 3.12
        channels: local,defaults,conda-forge
        # conda-forge is needed to pick up the noarch build of proxyspy
    - name: Build test environments
      run: |
        rm -rf $CONDA/conda-bld || :
        mv conda-bld $CONDA/
        version=$(conda search local::anaconda-anon-usage | tail -1 | awk '{print $2}')
        pkg="anaconda-anon-usage=$version"
        # This is to address an issue with Linux ARM Python 3.9 only
        if [[ "${{ matrix.os }}" = ubuntu-*-arm ]]; then ppkg="python<3.9|>=3.10"; else ppkg=""; fi
        echo "-------------------------"
        echo "UPDATING BASE ENVIRONMENT"
        echo "-------------------------"
        if [ ${{ matrix.os }} = macos-15-intel ]; then conda remove --force anaconda-auth || :; fi
        conda install anaconda-client constructor $pkg
        echo "-------------------------"
        echo "CREATING TEST ENVIRONMENT"
        echo "-------------------------"
        conda create -p ./testenv $ppkg $pkg conda==${{ matrix.cversion }} --file tests/requirements.txt
        echo "-------------------------"
        echo "CREATING TEST CHILD ENV 1"
        echo "-------------------------"
        mkdir -p ./testenv/envs
        conda create -p ./testenv/envs/testchild1 python --yes
        echo "-------------------------"
        echo "CREATING TEST CHILD ENV 2"
        echo "-------------------------"
        conda create -p ./testenv/envs/testchild2 python --yes
        if [ -f ./testenv/Scripts/conda.exe ]; then \
           sed -i.bak "s@CONDA_EXE=.*@CONDA_EXE=$PWD/testenv/Scripts/conda.exe@" testenv/etc/profile.d/conda.sh; \
        fi
        conda config --set solver classic
    - name: Test code
      run: |
        source testenv/etc/profile.d/conda.sh
        conda activate base
        conda info 2>&1 | tee output.txt
        if grep -q 'Error loading' output.txt; then exit -1; fi
        pytest --ignore=tests/test_rust_parity.py
        python tests/integration/test_config.py
    - name: Run Rust parity tests
      if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest' || matrix.os == 'windows-latest'
      run: |
        source testenv/etc/profile.d/conda.sh
        conda activate base
        pytest tests/test_rust_parity.py -v
    - name: Test heartbeats (pwsh)
      if: matrix.os == 'windows-latest' && matrix.cversion >= '24' && matrix.cversion < '4'
      shell: pwsh
      run: |
        .\testenv\shell\condabin\conda-hook.ps1
        conda activate base
        python tests\integration\test_heartbeats.py powershell
    - name: Test heartbeats (cmd)
      if: matrix.os == 'windows-latest' && matrix.cversion >= '24' && matrix.cversion < '4'
      shell: cmd
      run: |
        call .\testenv\Scripts\activate.bat
        if %errorlevel% neq 0 exit 1
        python tests\integration\test_heartbeats.py cmd.exe
        if %errorlevel% neq 0 exit 1
    - name: Test heartbeats (bash)
      if: matrix.os != 'windows-latest' && matrix.cversion >= '24' && matrix.cversion < '4'
      run: |
        source ./testenv/bin/activate
        conda info
        python tests/integration/test_heartbeats.py posix
    - name: Build an installer
      if: matrix.cversion >= '24' && matrix.cversion < '4'
      run: |
        cd tests/integration
        export CONDA_PREFIX=$CONDA
        bash test_installer.sh ${{ matrix.cversion }}
    - name: Run the installer (Windows)
      if: matrix.os == 'windows-latest' && matrix.cversion >= '24' && matrix.cversion < '4'
      shell: cmd
      run: |
        cd tests/integration
        start /wait AIDTest-1.0-Windows-x86_64.exe /S /D=%USERPROFILE%\aidtest
        call %USERPROFILE%\aidtest\Scripts\activate
        conda info
    - name: Run the installer (Unix)
      if: matrix.os != 'windows-latest' && matrix.cversion >= '24' && matrix.cversion < '4'
      run: |
        cd tests/integration
        bash AIDTest*.sh -b -p ~/aidtest -k
        source ~/aidtest/bin/activate
        conda info
    - name: Test the installed environment
      if: matrix.cversion >= '24' && matrix.cversion < '4'
      run: |
        cd tests/integration
        bash test_environment.sh ~/aidtest
  upload:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
    - name: Retrieve the source code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Download build artfiacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: conda-bld
        path: conda-bld
    - name: Upload to anaconda.org
      if: github.event_name == 'push'
      env:
        ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        GITHUB_REF: ${{ github.ref }}
      run: |
        source $CONDA/bin/activate
        conda install anaconda-client
        [[ "$GITHUB_REF" =~ ^refs/tags/ ]] || export LABEL="--label dev"
        packages=$(ls -1 conda-bld/*/*.{tar.bz2,conda} 2>/dev/null || :)
        anaconda --verbose --token $ANACONDA_TOKEN upload --user ctools $LABEL $packages --force
    - name: Install Rust toolchain
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: dtolnay/rust-toolchain@stable
    - name: Set crate version from git tag
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      working-directory: rust
      run: |
        VERSION="${{ github.ref_name }}"
        echo "Setting crate version to $VERSION"
        sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml
        cat Cargo.toml | head -6
    - name: Authenticate with crates.io (OIDC)
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      id: crates-io-auth
      uses: rust-lang/crates-io-auth-action@v1
    - name: Publish crate to crates.io
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      working-directory: rust
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
      run: |
        # --allow-dirty: the "Set crate version" step patches Cargo.toml
        # without committing, so cargo sees a dirty working tree.
        cargo publish --allow-dirty
